# -----------------------------------------------------------------------------
# mypy.ini — Configuration Mypy (vérification de types optionnelle).
#
# Extrait de l'ancien `[tool.mypy]` de pyproject.toml.
# -----------------------------------------------------------------------------

[mypy]
python_version = 3.10
# pybaselines, scipy : stubs partiels ou absents → on n'en fait pas un blocage.
ignore_missing_imports = True
warn_unused_ignores = True
